apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-api
  namespace: weather-api
  annotations:
    checkov.io/skip1: CKV_K8S_43=Kustomize pins the deployment image to a signed immutable GHCR digest.
    checkov.io/skip2: CKV_K8S_15=IfNotPresent is intentional because production deployments use an immutable digest.
  labels:
    app.kubernetes.io/name: weather-api
    app.kubernetes.io/part-of: weather-api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: weather-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: weather-api
        app.kubernetes.io/part-of: weather-api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: weather-api
          image: weather-api
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: GEOCODING_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: weather-api-config
                  key: geocoding-base-url
            - name: WEATHER_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: weather-api-config
                  key: weather-base-url
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
