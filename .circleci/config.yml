version: 2.1

executors:
  java21:
    docker:
      - image: cimg/openjdk:21.0
    working_directory: ~/project

commands:
  restore_maven_cache:
    steps:
      - restore_cache:
          keys:
            - maven-v2-{{ checksum "pom.xml" }}
            - maven-v2-

  save_maven_cache:
    steps:
      - save_cache:
          key: maven-v2-{{ checksum "pom.xml" }}
          paths:
            - ~/.m2/repository

jobs:
  prepare:
    executor: java21
    steps:
      - checkout
      - restore_maven_cache
      - run:
          name: Prepare build
          command: chmod +x mvnw && ./mvnw -B -ntp clean compile
      - save_maven_cache
      - persist_to_workspace:
          root: ~/project
          paths:
            - .
      - run:
          name: Notify prepare failure
          when: on_fail
          command: |
            if [ -z "${PIPELINE_NOTIFICATION_WEBHOOK:-}" ]; then
              echo "PIPELINE_NOTIFICATION_WEBHOOK is not configured. Skipping notification."
              exit 0
            fi

            payload=$(cat <<EOF
            {
              "status": "failed",
              "project": "${CIRCLE_PROJECT_REPONAME}",
              "branch": "${CIRCLE_BRANCH}",
              "job": "${CIRCLE_JOB}",
              "build_num": "${CIRCLE_BUILD_NUM}",
              "build_url": "${CIRCLE_BUILD_URL}",
              "workflow_id": "${CIRCLE_WORKFLOW_ID}",
              "commit": "${CIRCLE_SHA1}",
              "color": "danger"
            }
            EOF
            )

            curl -f -X POST -H "Content-Type: application/json" -d "${payload}" "${PIPELINE_NOTIFICATION_WEBHOOK}"

  lint:
    executor: java21
    steps:
      - attach_workspace:
          at: ~/project
      - restore_maven_cache
      - run:
          name: Check code style
          command: chmod +x mvnw && ./mvnw -B -ntp checkstyle:check
      - save_maven_cache
      - run:
          name: Notify lint failure
          when: on_fail
          command: |
            if [ -z "${PIPELINE_NOTIFICATION_WEBHOOK:-}" ]; then
              echo "PIPELINE_NOTIFICATION_WEBHOOK is not configured. Skipping notification."
              exit 0
            fi

            payload=$(cat <<EOF
            {
              "status": "failed",
              "project": "${CIRCLE_PROJECT_REPONAME}",
              "branch": "${CIRCLE_BRANCH}",
              "job": "${CIRCLE_JOB}",
              "build_num": "${CIRCLE_BUILD_NUM}",
              "build_url": "${CIRCLE_BUILD_URL}",
              "workflow_id": "${CIRCLE_WORKFLOW_ID}",
              "commit": "${CIRCLE_SHA1}",
              "color": "danger"
            }
            EOF
            )

            curl -f -X POST -H "Content-Type: application/json" -d "${payload}" "${PIPELINE_NOTIFICATION_WEBHOOK}"

  test_parallel:
    executor: java21
    parallelism: 3
    steps:
      - attach_workspace:
          at: ~/project
      - restore_maven_cache
      - run:
          name: Split and run tests in parallel
          command: |
            mkdir -p target/surefire-reports

            TEST_CLASSES=$(
              circleci tests glob "src/test/java/**/*Tests.java" \
              | sed 's#^src/test/java/##' \
              | sed 's#/#.#g' \
              | sed 's#\.java$##' \
              | circleci tests split --split-by=timings --timings-type=classname \
              | paste -sd, -
            )

            if [ -z "${TEST_CLASSES}" ]; then
              echo "No test classes were assigned to this node."
              exit 0
            fi

            chmod +x mvnw
            ./mvnw -B -ntp -DfailIfNoTests=false -Dtest="${TEST_CLASSES}" test
      - save_maven_cache
      - store_test_results:
          path: target/surefire-reports
      - store_artifacts:
          path: target/surefire-reports
      - run:
          name: Notify test failure
          when: on_fail
          command: |
            if [ -z "${PIPELINE_NOTIFICATION_WEBHOOK:-}" ]; then
              echo "PIPELINE_NOTIFICATION_WEBHOOK is not configured. Skipping notification."
              exit 0
            fi

            payload=$(cat <<EOF
            {
              "status": "failed",
              "project": "${CIRCLE_PROJECT_REPONAME}",
              "branch": "${CIRCLE_BRANCH}",
              "job": "${CIRCLE_JOB}",
              "build_num": "${CIRCLE_BUILD_NUM}",
              "build_url": "${CIRCLE_BUILD_URL}",
              "workflow_id": "${CIRCLE_WORKFLOW_ID}",
              "commit": "${CIRCLE_SHA1}",
              "color": "danger"
            }
            EOF
            )

            curl -f -X POST -H "Content-Type: application/json" -d "${payload}" "${PIPELINE_NOTIFICATION_WEBHOOK}"

  package:
    executor: java21
    steps:
      - attach_workspace:
          at: ~/project
      - restore_maven_cache
      - run:
          name: Build artifact
          command: chmod +x mvnw && ./mvnw -B -ntp -DskipTests package
      - save_maven_cache
      - store_artifacts:
          path: target
      - run:
          name: Notify package success
          when: on_success
          command: |
            if [ -z "${PIPELINE_NOTIFICATION_WEBHOOK:-}" ]; then
              echo "PIPELINE_NOTIFICATION_WEBHOOK is not configured. Skipping notification."
              exit 0
            fi

            payload=$(cat <<EOF
            {
              "status": "success",
              "project": "${CIRCLE_PROJECT_REPONAME}",
              "branch": "${CIRCLE_BRANCH}",
              "job": "${CIRCLE_JOB}",
              "build_num": "${CIRCLE_BUILD_NUM}",
              "build_url": "${CIRCLE_BUILD_URL}",
              "workflow_id": "${CIRCLE_WORKFLOW_ID}",
              "commit": "${CIRCLE_SHA1}",
              "color": "good"
            }
            EOF
            )

            curl -f -X POST -H "Content-Type: application/json" -d "${payload}" "${PIPELINE_NOTIFICATION_WEBHOOK}"
      - run:
          name: Notify package failure
          when: on_fail
          command: |
            if [ -z "${PIPELINE_NOTIFICATION_WEBHOOK:-}" ]; then
              echo "PIPELINE_NOTIFICATION_WEBHOOK is not configured. Skipping notification."
              exit 0
            fi

            payload=$(cat <<EOF
            {
              "status": "failed",
              "project": "${CIRCLE_PROJECT_REPONAME}",
              "branch": "${CIRCLE_BRANCH}",
              "job": "${CIRCLE_JOB}",
              "build_num": "${CIRCLE_BUILD_NUM}",
              "build_url": "${CIRCLE_BUILD_URL}",
              "workflow_id": "${CIRCLE_WORKFLOW_ID}",
              "commit": "${CIRCLE_SHA1}",
              "color": "danger"
            }
            EOF
            )

            curl -f -X POST -H "Content-Type: application/json" -d "${payload}" "${PIPELINE_NOTIFICATION_WEBHOOK}"

workflows:
  weather-api-pipeline:
    jobs:
      - prepare
      - lint:
          requires:
            - prepare
      - test_parallel:
          requires:
            - prepare
      - package:
          requires:
            - lint
            - test_parallel
          filters:
            branches:
              only:
                - main
                - develop
