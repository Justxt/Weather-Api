name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Disable SonarQube automatic analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          curl -fsS -u "${SONAR_TOKEN}:" \
            -X POST "https://sonarcloud.io/api/autoscan/activation" \
            -d "projectKey=SebasDh56_Weather-Api" \
            -d "enable=false"

      - name: Build and analyze
        run: |
          chmod +x mvnw
          ./mvnw -B verify \
            org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar \
            -Dsonar.projectKey=SebasDh56_Weather-Api \
            -Dsonar.organization=sebasdh56 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="${{ secrets.SONAR_TOKEN }}" \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.exclusions="**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/vendor/**,**/target/**,**/generated-sources/**,**/generated-test-sources/**,**/*.generated.*,**/tmp/**,**/temp/**"
