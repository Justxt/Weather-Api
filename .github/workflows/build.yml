name: Quality and Security

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Disable SonarQube automatic analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          curl -fsS -u "${SONAR_TOKEN}:" \
            -X POST "https://sonarcloud.io/api/autoscan/activation" \
            -d "projectKey=SebasDh56_Weather-Api" \
            -d "enable=false"

      - name: Build and analyze
        run: |
          chmod +x mvnw
          ./mvnw -B verify \
            org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar \
            -Dsonar.projectKey=SebasDh56_Weather-Api \
            -Dsonar.organization=sebasdh56 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="${{ secrets.SONAR_TOKEN }}" \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.exclusions="**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/vendor/**,**/target/**,**/generated-sources/**,**/generated-test-sources/**,**/*.generated.*,**/tmp/**,**/temp/**"

      - name: Start application for DAST
        run: |
          java -jar target/ApiWeather-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
          echo $! > app.pid

          for i in {1..30}; do
            if curl -fsS http://localhost:8080/api/health; then
              echo "Application is ready for DAST."
              exit 0
            fi

            echo "Waiting for application to start..."
            sleep 2
          done

          echo "Application did not start in time."
          cat app.log
          exit 1

      - name: OWASP ZAP baseline scan
        run: |
          mkdir -p zap-report
          chmod 777 zap-report
          docker run --rm \
            --add-host=host.docker.internal:host-gateway \
            -v "$(pwd)/zap-report:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://host.docker.internal:8080/api/health \
            -r zap-baseline-report.html \
            -w zap-baseline-report.md \
            -J zap-baseline-report.json \
            -I

      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi

      - name: Upload OWASP ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-zap-baseline-report
          path: |
            zap-report/
            app.log
