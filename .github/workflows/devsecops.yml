name: Weather-Api DevSecOps

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/weather-api

jobs:
  test:
    name: Build, tests and coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Compile, test and validate style
        run: ./mvnw -B -ntp clean verify
      - name: Upload application and test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: maven-build-reports
          path: |
            target/*.jar
            target/surefire-reports/
            target/site/jacoco/
          if-no-files-found: warn
          retention-days: 14

  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: python -m pip install --disable-pip-version-check semgrep==1.170.0
      - name: Analyze Java source
        run: semgrep scan --config p/java --config p/owasp-top-ten --error --sarif --output semgrep.sarif src
      - name: Upload SAST report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: semgrep-sast-report
          path: semgrep.sarif
          if-no-files-found: warn
          retention-days: 14

  policy:
    name: Policy as Code - Checkov
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install Checkov
        run: python -m pip install --disable-pip-version-check checkov==3.2.529
      - name: Validate Docker and Kubernetes policies
        run: >-
          checkov -d .
          --framework dockerfile kubernetes
          --compact
          --output cli
          --output sarif
          --output-file-path console,checkov.sarif
      - name: Upload policy report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: checkov-policy-report
          path: checkov.sarif
          if-no-files-found: warn
          retention-days: 14

  secrets:
    name: Secret scanning - Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Detect committed secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image:
    name: Image, SCA, DAST, publish and sign
    needs: [test, sast, policy, secrets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Define immutable coordinates
        id: meta
        shell: bash
        run: |
          image="${REGISTRY}/${IMAGE_NAME,,}"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Build security candidate
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          push: false
          tags: weather-api:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan OS packages and Java dependencies with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: weather-api:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true
          ignore-unfixed: true
          scanners: vuln
          exit-code: "1"
      - name: Upload image report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-image-report
          path: trivy-results.sarif
          if-no-files-found: warn
          retention-days: 14
      - name: Start ephemeral API
        run: |
          python3 scripts/mock-upstreams.py --port 19090 > /tmp/weather-api-mock.log 2>&1 &
          echo "$!" > /tmp/weather-api-mock.pid
          docker run -d --rm --name weather-api-zap \
            --add-host=host.docker.internal:host-gateway \
            -e GEOCODING_BASE_URL=http://host.docker.internal:19090 \
            -e WEATHER_BASE_URL=http://host.docker.internal:19090/forecast \
            -p 8080:8080 weather-api:scan
          for _ in {1..30}; do
            curl --fail --silent http://127.0.0.1:8080/api/health && exit 0
            sleep 2
          done
          docker logs weather-api-zap
          exit 1
      - name: DAST - OWASP ZAP API scan
        run: |
          dast_date="$(date -u -d '+3 days' +%F)"
          mkdir -p zap-work
          sed "s/__DAST_DATE__/${dast_date}/g" openapi/weather-api.yaml > zap-work/openapi-dast.yaml
          chmod 0777 zap-work
          curl --fail --silent --show-error \
            -H 'Content-Type: application/json' \
            -d "{\"city\":\"Quito\",\"date\":\"${dast_date}\"}" \
            http://127.0.0.1:8080/api/flight-cancellation-risk > functional-response.json
          grep -q 'riskLevel' functional-response.json
          docker run --rm --network host -v "${PWD}/zap-work:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable@sha256:8d387b1a63e3425beef4846e39719f5af2a787753af2d8b6558c6257d7a577a2 \
            zap-api-scan.py -t /zap/wrk/openapi-dast.yaml -f openapi \
            -r zap-report.html -w zap-report.md -J zap-report.json -I -T 5
      - name: Stop ephemeral API
        if: always()
        run: |
          docker rm -f weather-api-zap 2>/dev/null || true
          if test -f /tmp/weather-api-mock.pid; then
            kill "$(cat /tmp/weather-api-mock.pid)" 2>/dev/null || true
          fi
      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zap-dast-report
          path: zap-work/zap-report.*
          if-no-files-found: warn
          retention-days: 14
      - name: Authenticate to GHCR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish immutable image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        id: push
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker tag weather-api:scan "${IMAGE}:${TAG}"
          docker push "${IMAGE}:${TAG}"
          repo_digest="$(docker image inspect --format='{{index .RepoDigests 0}}' "${IMAGE}:${TAG}")"
          digest="${repo_digest#*@}"
          test -n "$digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Install Cosign
        if: steps.push.outputs.digest != ''
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign published digest with GitHub OIDC
        if: steps.push.outputs.digest != ''
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

  deploy:
    name: Deploy signed image to Minikube
    needs: image
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, windows, weather-api-minikube]
    environment: minikube
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Validate Minikube
        shell: powershell
        run: |
          minikube status --profile minikube
          kubectl config use-context minikube
      - name: Authenticate and load image
        shell: powershell
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ needs.image.outputs.image }}
          DIGEST: ${{ needs.image.outputs.digest }}
        run: |
          $env:GHCR_TOKEN | docker login ghcr.io --username '${{ github.actor }}' --password-stdin
          docker pull "$env:IMAGE@$env:DIGEST"
          minikube image load "$env:IMAGE@$env:DIGEST" --profile minikube
      - name: Verify keyless signature
        shell: powershell
        env:
          IMAGE: ${{ needs.image.outputs.image }}
          DIGEST: ${{ needs.image.outputs.digest }}
        run: |
          cosign verify `
            --certificate-identity-regexp="^https://github.com/${{ github.repository }}/.github/workflows/devsecops.yml@refs/heads/main$" `
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" `
            "$env:IMAGE@$env:DIGEST"
      - name: Apply manifests and immutable digest
        shell: powershell
        env:
          IMAGE: ${{ needs.image.outputs.image }}
          DIGEST: ${{ needs.image.outputs.digest }}
        run: |
          kubectl kustomize k8s/base | kubectl apply -f -
          kubectl -n weather-api set image deployment/weather-api "weather-api=$env:IMAGE@$env:DIGEST"
          kubectl -n weather-api rollout status deployment/weather-api --timeout=240s
      - name: Smoke test and collect evidence
        shell: powershell
        run: |
          $portForward = Start-Job -ScriptBlock {
            kubectl -n weather-api port-forward service/weather-api 18080:80
          }
          try {
            $response = $null
            for ($attempt = 1; $attempt -le 30; $attempt++) {
              try {
                $response = Invoke-RestMethod http://127.0.0.1:18080/api/health
                break
              } catch {
                Start-Sleep -Seconds 2
              }
            }
            if ($null -eq $response -or $response.status -ne 'UP') {
              throw 'El smoke test no obtuvo status UP.'
            }
            $request = @{
              city = 'Quito'
              date = (Get-Date).ToUniversalTime().AddDays(3).ToString('yyyy-MM-dd')
            } | ConvertTo-Json
            $risk = Invoke-RestMethod `
              -Method Post `
              -Uri http://127.0.0.1:18080/api/flight-cancellation-risk `
              -ContentType 'application/json' `
              -Body $request
            if ([string]::IsNullOrWhiteSpace($risk.riskLevel)) {
              throw 'El smoke test funcional no obtuvo riskLevel.'
            }
            kubectl -n weather-api get deployment,pods,service -o wide | Tee-Object deployment-evidence.txt
            "Health: $($response | ConvertTo-Json -Compress)" | Tee-Object -Append deployment-evidence.txt
            "Functional: $($risk | ConvertTo-Json -Compress)" | Tee-Object -Append deployment-evidence.txt
          } finally {
            Stop-Job $portForward -ErrorAction SilentlyContinue
            Remove-Job $portForward -Force -ErrorAction SilentlyContinue
          }
      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: minikube-deployment-evidence
          path: deployment-evidence.txt
          if-no-files-found: warn
          retention-days: 14
